name: Generar productos GFS

on:
  workflow_dispatch:

  schedule:
    - cron: "0 4 * * *"   # 04 UTC
    - cron: "0 18 * * *"  # 18 UTC

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verificar Python
        run: |
          python --version

      - name: Instalar librerías meteorológicas
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy \
            pandas \
            matplotlib \
            xarray \
            cfgrib \
            netCDF4 \
            metpy \
            cartopy

      - name: Verificar scripts Python
        run: |
          echo "Contenido carpeta python:"
          ls -la python

      - name: Compilar proyecto Java
        run: |
          mvn clean package

      - name: Ejecutar generador de soundings
        run: |
          mvn exec:java -Dexec.mainClass=GenerarSoundingsAutomaticoGFS

      - name: Ejecutar generador meteorologico
        run: |
          java -jar target/generador-cartas-gfs-1.0.0-jar-with-dependencies.jar

      - name: Mostrar carpetas generadas
        if: always()
        run: |
          echo "===== GRIBS ====="
          find gribs -type f 2>/dev/null | head -50

          echo "===== SALIDAS ====="
          find salidas -type f 2>/dev/null | head -100

      - name: Generar nombre del artifact
        id: nombre
        if: always()
        run: |
          FECHA=$(date -u +'%d%m%Y')
          HORA=$(date -u +'%H')
          echo "artifact_name=${FECHA}${HORA}UTC" >> $GITHUB_OUTPUT

      - name: Dividir productos en ZIP
        if: always()
        run: |
          mkdir -p paquetes

          zip -r "paquetes/${{ steps.nombre.outputs.artifact_name }}_cartas.zip" salidas/*/cartas* || true

          zip -r "paquetes/${{ steps.nombre.outputs.artifact_name }}_meteogramas.zip" salidas/*/meteogramas* || true

          zip -r "paquetes/${{ steps.nombre.outputs.artifact_name }}_soundings.zip" salidas/*/soundings* || true

          echo "===== PAQUETES GENERADOS ====="
          ls -lh paquetes

      - name: Subir resultados divididos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.nombre.outputs.artifact_name }}_paquetes
          path: paquetes/
          retention-days: 7
