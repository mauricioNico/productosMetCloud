name: Prueba Maven + Python

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verificar Python
        run: |
          python --version

      - name: Instalar librerías básicas
        run: |
          python -m pip install --upgrade pip
          pip install \
          numpy \
          pandas \
          matplotlib \
          xarray \
          cfgrib \
          netCDF4 \
          metpy \
          cartopy

      - name: Compilar proyecto
        run: |
          mvn clean package